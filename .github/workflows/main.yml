name: Build Tweak

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git ~/theos
          
          # تحميل الـ SDK المضمون والمستقر لنظام iOS
          mkdir -p ~/theos/sdks
          curl -LO https://github.com/theos/sdks/archive/refs/heads/master.zip
          unzip master.zip
          mv sdks-master/* ~/theos/sdks/
          rm -rf master.zip sdks-master

      - name: Build
        run: |
          export THEOS=~/theos
          make clean
          make FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OneStateMoumenMod
          path: packages/
