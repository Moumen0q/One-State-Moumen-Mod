name: Build Tweak

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git ~/theos
          mkdir -p ~/theos/sdks
          git clone https://github.com/theos/sdks.git ~/theos/sdks/

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          make clean
          make FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
